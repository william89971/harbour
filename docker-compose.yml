services:
  harbour:
    build:
      context: .
    image: harbour:local
    container_name: harbour
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      HARBOUR_HOME: /data
      # Optional: point at a Postgres backend instead of the bundled SQLite
      # file. Compose interpolates from your shell env; unset means SQLite.
      # Example: DATABASE_URL=postgres://harbour:harbour@postgres:5432/harbour
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./data:/data

  # Optional Postgres backend. Activate with: docker compose --profile postgres up -d
  # Combine with DATABASE_URL=postgres://harbour:harbour@postgres:5432/harbour to
  # point the harbour service at it.
  postgres:
    image: postgres:16-alpine
    container_name: harbour-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: harbour
      POSTGRES_USER: harbour
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harbour}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles: ["postgres"]

  # Simulated remote worker — same repo, different entrypoint. Exists so the
  # remote-runner flow can be validated without a second physical machine.
  # In production, you'd run `harbour agent run` directly on the remote box.
  harbour-remote:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: harbour-runner:local
    container_name: harbour-remote
    restart: unless-stopped
    depends_on:
      - harbour
    environment:
      HARBOUR_HOME: /data
    volumes:
      - ./data-remote:/data
    profiles: ["remote"]
